    <style>
        html {

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        .navbar {

            background-position: center;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .skill-card:hover {
            transform: translateY(-10px);

        }
    </style>
</head>
